name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: typst-community/setup-typst@v4
        with:
          typst-version: "0.13.0"

      - name: Cache cargo-installed binaries
        id: cache-bins
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin
          # Bump the trailing version when the pinned tool versions change.
          key: cargo-bins-${{ runner.os }}-typstyle0.14.4-tytanic0.3.3-pcheck0.4.6-v1

      - name: Install typstyle
        if: steps.cache-bins.outputs.cache-hit != 'true'
        run: cargo install typstyle --locked --version 0.14.4

      - name: Install tytanic
        if: steps.cache-bins.outputs.cache-hit != 'true'
        run: cargo install tytanic --locked --version 0.3.3

      - name: Install typst-package-check
        if: steps.cache-bins.outputs.cache-hit != 'true'
        run: cargo install --git https://github.com/typst/package-check --rev 69272e4 typst-package-check

      - name: Read package version
        id: pkg
        run: |
          version=$(awk -F'"' '/^version *=/ {print $2; exit}' typst.toml)
          if [ -z "$version" ]; then
            echo "could not extract version from typst.toml" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "todone version: $version"

      - name: Verify version references are in sync
        env:
          VERSION: ${{ steps.pkg.outputs.version }}
        run: ./scripts/check-version-refs.sh "$VERSION"

      - name: typstyle --check
        run: typstyle --check lib.typ src/*.typ examples/*.typ

      - name: Stage package into Typst data dir
        env:
          VERSION: ${{ steps.pkg.outputs.version }}
        run: |
          dest="$HOME/.local/share/typst/packages/preview/todone/$VERSION"
          mkdir -p "$dest"
          rsync -a --exclude='.git' --exclude='.github' --exclude='examples/*.pdf' \
            ./ "$dest/"

      - name: Compile examples
        run: |
          typst compile examples/basic.typ
          typst compile examples/advanced.typ

      - name: Run tytanic
        run: tt run --no-fail-fast

      - name: Stage package into package-check layout
        env:
          VERSION: ${{ steps.pkg.outputs.version }}
        run: |
          dest="packages-check/packages/preview/todone/$VERSION"
          mkdir -p "$dest"
          rsync -a --exclude='.git' --exclude='.github' --exclude='packages-check' \
            --exclude='examples/*.pdf' \
            ./ "$dest/"

      - name: Package check
        working-directory: packages-check/packages
        env:
          VERSION: ${{ steps.pkg.outputs.version }}
        run: typst-package-check check "preview/todone/$VERSION"
