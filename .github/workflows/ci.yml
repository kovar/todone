name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: typst-community/setup-typst@v4
        with:
          typst-version: "0.13.0"

      - name: Install typstyle
        run: cargo install typstyle --locked

      - name: Install tytanic
        run: cargo install tytanic

      - name: Install typst-package-check
        run: cargo install --git https://github.com/typst/package-check typst-package-check

      - name: typstyle --check
        run: typstyle --check lib.typ src/*.typ examples/*.typ

      - name: Stage package into Typst data dir
        run: |
          mkdir -p "$HOME/.local/share/typst/packages/preview/todone/0.1.0"
          rsync -a --exclude='.git' --exclude='.github' --exclude='examples/*.pdf' \
            ./ "$HOME/.local/share/typst/packages/preview/todone/0.1.0/"

      - name: Compile examples
        run: |
          typst compile examples/basic.typ
          typst compile examples/advanced.typ

      - name: Run tytanic
        run: tt run --no-fail-fast

      - name: Stage package into package-check layout
        run: |
          mkdir -p packages-check/packages/preview/todone/0.1.0
          rsync -a --exclude='.git' --exclude='.github' --exclude='packages-check' \
            --exclude='examples/*.pdf' \
            ./ packages-check/packages/preview/todone/0.1.0/

      - name: Package check
        working-directory: packages-check/packages
        run: typst-package-check check preview/todone/0.1.0
