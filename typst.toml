[package]
name = "todone"
version = "0.1.0"
entrypoint = "lib.typ"
authors = ["kovar <@kovar>"]
license = "MIT"
description = "Annotate TODOs with auto-colored @mentioned assignees."
repository = "https://github.com/kovar/todone"
keywords = ["todo", "annotation", "review", "comments", "assignee"]
categories = ["utility", "components"]
compiler = "0.13.0"
exclude = [
  ".github/**",
  ".claude/**",
  ".gitignore",
  ".pre-commit-config.yaml",
  "examples/**",
  "scripts/**",
  "tests/**",
]
